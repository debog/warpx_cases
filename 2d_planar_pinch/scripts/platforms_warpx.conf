# Platform configuration file for WarpX runs
# Format: platform.key = value
#
# Supported schedulers: slurm, flux, direct (no scheduler)
# For GPU platforms, set gpu_support=true and gpus_per_task

# =============================================================================
# Desktop/Workstation (default when neither LCHOST nor NERSC_HOST is set)
# =============================================================================
[desktop]
scheduler       = direct
ntasks          = 4
nnodes          = 1
cores_per_node  = 4
gpu_support     = false
mpi_launcher    = mpirun
queue           =
account         =
walltime        =
omp_threads     = 1

# =============================================================================
# DANE - CPU cluster with SLURM
# =============================================================================
[dane]
scheduler       = slurm
ntasks          = 448
nnodes          = 4
cores_per_node  = 112
gpu_support     = false
queue           = pbatch
debug_queue     = pdebug
account         = asccasc
walltime        = 4:00:00
# Use single thread on Dane
omp_threads     = 1

# =============================================================================
# MATRIX - GPU cluster with SLURM
# =============================================================================
[matrix]
scheduler       = slurm
ntasks          = 16
nnodes          = 4
cores_per_node  = 4
gpu_support     = true
gpus_per_task   = 1
queue           = pbatch
debug_queue     = pdebug
account         = asccasc
walltime        = 4:00:00
# Use single thread on Matrix
omp_threads     = 1

# =============================================================================
# TUOLUMNE - Flux-based system with GPU support
# =============================================================================
[tuolumne]
scheduler       = flux
ntasks          = 16
nnodes          = 4
cores_per_node  = 4
gpu_support     = true
gpus_per_task   = 1
queue           = pbatch
debug_queue     = pdebug
account         = asccasc
walltime        = 4h
# Extra environment variables needed for GPU MPI and HDF5 on Lustre
env_vars        = MPICH_GPU_SUPPORT_ENABLED=1 HSA_XNACK=1 MPICH_OFI_NIC_POLICY=GPU HDF5_USE_FILE_LOCKING=FALSE
# Use single OpenMP thread
omp_threads     = 1

# =============================================================================
# NERSC Perlmutter - GPU cluster with SLURM
# =============================================================================
[perlmutter]
scheduler       = slurm
ntasks          = 4
nnodes          = 1
cores_per_node  = 64
gpu_support     = true
gpus_per_task   = 1
queue           = regular
debug_queue     = debug
account         =
walltime        = 4:00:00
# Perlmutter-specific environment
env_vars        = MPICH_GPU_SUPPORT_ENABLED=1
omp_threads     = 1
