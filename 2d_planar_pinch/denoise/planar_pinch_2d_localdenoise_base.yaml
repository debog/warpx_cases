# Shared base for the 2D Cartesian planar-pinch local-physics
# denoiser cases on Tuolumne. Loaded by every variant via `base:`.
#
# Phase-1 / Round-4 channel set: same SNR-restricted set as the
# global denoiser base (planar_pinch_2d_denoise_base.yaml). Inputs
# drop the equipartition-only field components; outputs drop rho
# and the bulk-velocity moments. Per-channel weights re-set by
# load-bearing role (J components weight 5; num_α weight 1; ene
# channels weight 0.3). See the global base for the full rationale.
#
# This file is not meant to be passed directly to
# `local-particle-denoise train`; pick a variant
# (e.g. planar_pinch_2d_localdenoise_charbonnier.yaml) so the run
# selects an explicit loss recipe.

data:
  reader: warpxPlotfile
  warpx_input: /home/ghosh/Runs/warpx/2d_planar_pinch/inputs/planar_pinch_2d.in

  ppc_tiers:
    - {name: ppc0036, ppc: 36,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0036.nproc00016}
    - {name: ppc0064, ppc: 64,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0064.nproc00016}
    - {name: ppc0144, ppc: 144,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0144.nproc00016}
    - {name: ppc0256, ppc: 256,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0256.nproc00016}
    - {name: ppc1024, ppc: 1024, ground_truth: true,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc1024.nproc00016}

  val_fraction: 0.15

  # Local-physics dataset settings.
  dataset_type: patch
  # Per-axis BC for the planar pinch. The (x, z) layout is
  # PEC-PEC on x_lo / x_hi (insulator-PEC) and periodic on z.
  boundary_spec: ["pec", "periodic"]
  # Append signed-distance-to-PEC channels to each patch. With one
  # entry per spatial axis these add 2 channels on top of the
  # input channels.
  boundary_channels: true

  channels:
    fields:
      - Ex
      - By
      - jx
      - jy
      - jz
      - rho
      - part_per_cell
    species:
      - num
      - ux
      - uy
      - uz
      - enex
      - eney
      - enez
    species_names:
      - electrons
      - deuterium
    output_fields:
      - jx
      - jy
      - jz
    output_species_moments:
      - num
      - enex
      - eney
      - enez

model:
  name: localCNN
  base_channels: 64
  depth: 3
  kernel: 3
  activation: gelu
  # 7-cell patch covers two shape-function widths plus margin for
  # the WarpX 2nd-order spline deposition; trunk depth=3 with valid
  # 3x3 convs takes 7 -> 5 -> 3 -> 1, naturally selecting the centre
  # cell.
  patch_size: 7

loss:
  recon: 1.0
  recon_weights:
    jx:              5.0
    jy:              5.0
    jz:              5.0
    num_electrons:   1.0
    num_deuterium:   1.0
    enex_electrons:  0.3
    eney_electrons:  0.3
    enez_electrons:  0.3
    enex_deuterium:  0.3
    eney_deuterium:  0.3
    enez_deuterium:  0.3
  # The conservation, spectral, and gradient terms are spatial; for
  # per-cell predictions they reduce to zero or fail to apply, so
  # they are disabled here. A snapshot-level conservation term is
  # planned in Phase 2 of the working-doc plan.
  conservation: 0.0
  spectral: 0.0
  gradient: 0.0
  gradient_kind: l2

train:
  # The patch dataset yields ~8 000 examples per snapshot and the
  # localCNN has only ~0.4 M parameters on 7x7x27 inputs, so the GPU
  # is heavily underutilised at small batches. Bump batch_size by an
  # order of magnitude to amortise per-step Python / DDP overhead.
  batch_size: 1024
  epochs: 500
  lr: 1.0e-3
  amp: true
  early_stop_patience: 50
  # The local denoiser sees ~10^5 steps per epoch (one per cell, per
  # low-ppc tier, per pair group), so the framework default of 50
  # would emit thousands of step-progress lines per epoch. 5000 keeps
  # it to a few dozen lines per epoch on the dense ppc sweep.
  log_interval_steps: 5000
