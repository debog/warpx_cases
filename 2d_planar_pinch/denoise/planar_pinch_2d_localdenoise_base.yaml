# Shared base for the 2D Cartesian planar-pinch local-physics
# denoiser cases on Tuolumne. Loaded by every variant via `base:`.
#
# Channel set mirrors the global denoiser base
# (planar_pinch_2d_denoise_base.yaml): inputs drop the equipartition-
# only field components, Ex (PIC-noise dominated), and rho
# (quasi-neutral, statistically noisy). Outputs use per-species
# momentum-density components (p_α = m_α · u_α / V_cell) instead of
# the bare velocity moments, so the channel set is symmetric in input
# and output. See the global base for the full SNR rationale.
#
# Per-channel reconstruction weights match the global base: jz=5
# (the dominant in-plane current), jx=jy=1 (zero physical mean in
# this geometry), num_α=1, p_x_α=1, the out-of-plane / weakly-
# structured p_y_α / p_z_α and the ene{x,y,z}_α moments at 0.3.
#
# Charge-continuity weight is 0 here: the local-physics denoiser
# predicts a single cell per sample, so a divergence operator is not
# meaningful at the per-prediction level. The term is reported as
# zero and the column is kept in the metrics CSV for consistency
# with the global base.
#
# This file is not meant to be passed directly to
# `local-particle-denoise train`; pick a variant
# (e.g. planar_pinch_2d_localdenoise_charbonnier.yaml) so the run
# selects an explicit loss recipe.

data:
  reader: warpxPlotfile
  warpx_input: inputs/planar_pinch_2d.in

  ppc_tiers:
    - {name: ppc0036, ppc: 36,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0036.nproc00016}
    - {name: ppc0064, ppc: 64,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0064.nproc00016}
    - {name: ppc0144, ppc: 144,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0144.nproc00016}
    - {name: ppc0256, ppc: 256,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0256.nproc00016}
    - {name: ppc1024, ppc: 1024, ground_truth: true,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc1024.nproc00016}

  val_fraction: 0.15

  # Local-physics dataset settings.
  dataset_type: patch
  # Per-axis BC for the planar pinch. The (x, z) layout is
  # PEC-PEC on x_lo / x_hi (insulator-PEC) and periodic on z.
  boundary_spec: ["pec", "periodic"]
  # Append signed-distance-to-PEC channels to each patch. With one
  # entry per spatial axis these add 2 channels on top of the
  # input channels.
  boundary_channels: true

  channels:
    fields:
      - By
      - jx
      - jy
      - jz
      - part_per_cell
    species:
      - num
      - px
      - py
      - pz
      - enex
      - eney
      - enez
      - Pxx
      - Pyy
      - Pzz
      - Tx
      - Ty
      - Tz
    species_names:
      - electrons
      - deuterium
    output_fields:
      - jx
      - jy
      - jz
    output_species_moments:
      - num
      - px
      - py
      - pz
      - enex
      - eney
      - enez

model:
  name: localCNN
  base_channels: 64
  depth: 3
  kernel: 3
  activation: gelu
  # 7-cell patch covers two shape-function widths plus margin for
  # the WarpX 2nd-order spline deposition; trunk depth=3 with valid
  # 3x3 convs takes 7 -> 5 -> 3 -> 1, naturally selecting the centre
  # cell.
  patch_size: 7

loss:
  recon: 1.0
  recon_weights:
    jx:              1.0
    jy:              1.0
    jz:              5.0
    num_electrons:   1.0
    num_deuterium:   1.0
    px_electrons:    1.0
    px_deuterium:    1.0
    py_electrons:    0.3
    py_deuterium:    0.3
    pz_electrons:    0.3
    pz_deuterium:    0.3
    enex_electrons:  0.3
    eney_electrons:  0.3
    enez_electrons:  0.3
    enex_deuterium:  0.3
    eney_deuterium:  0.3
    enez_deuterium:  0.3
  # The conservation, spectral, gradient, charge-continuity, and
  # closure-consistency terms are spatial / multi-cell; for per-cell
  # predictions they reduce to zero or fail to apply, so they are
  # disabled here. A snapshot-level conservation term is planned in
  # the next-steps plan.
  conservation: 0.0
  spectral: 0.0
  gradient: 0.0
  gradient_kind: l2
  charge_continuity:        0.0
  charge_continuity_cutoff: null
  closure_consistency:      0.0

train:
  # The patch dataset yields ~8 000 examples per snapshot and the
  # localCNN has only ~0.4 M parameters on 7x7x27 inputs, so the GPU
  # is heavily underutilised at small batches. Bump batch_size by an
  # order of magnitude to amortise per-step Python / DDP overhead.
  batch_size: 1024
  epochs: 500
  lr: 1.0e-3
  amp: true
  early_stop_patience: 50
  # The local denoiser sees ~10^5 steps per epoch (one per cell, per
  # low-ppc tier, per pair group), so the framework default of 50
  # would emit thousands of step-progress lines per epoch. 5000 keeps
  # it to a few dozen lines per epoch on the dense ppc sweep.
  log_interval_steps: 5000
