# Shared base for the 2D Cartesian planar-pinch global U-Net denoiser
# cases on Tuolumne. Variants under this directory layer their loss
# recipe on top of this.
#
# Channel set restricted by the signal-to-noise audit driven by the
# Angus et al. 2022 equipartition analysis (Eqn 24) and §3.1.4 of the
# working doc, with bulk-velocity moments replaced by per-species
# momentum-density components (p_α = m_α · u_α / V_cell):
#
#   * Inputs (fields): By (Z-pinch dominant component), all three
#     components of J, part_per_cell. Ex / Ey / Ez / Bx / Bz / rho
#     excluded by the SNR audit (equipartition or quasi-neutral
#     cancellation puts them below the deposition floor).
#   * Inputs (species): per-species number, three momentum-density
#     components (px, py, pz), three kinetic-energy moments (enex,
#     eney, enez), and the closure-of-the-moment-hierarchy derived
#     pressure-tensor diagonal (Pxx, Pyy, Pzz) and per-direction
#     temperature (Tx, Ty, Tz in eV). The P/T channels are computed in
#     the data loader from (num, ux, ene_i) with a num-floor of 1.0 to
#     regularize the 1/num singularity; they give the network direct
#     access to the closure relation rather than requiring it to learn
#     the division.
#   * Outputs: J = (jx, jy, jz) consumed by the implicit field solver,
#     plus per-species num_α, p{x,y,z}_α, ene{x,y,z}_α. P / T are
#     input-only; the closure relation is enforced via a closure-
#     consistency loss on the predicted (num, p, ene) instead of being
#     emitted as separate output channels.
#   * Reconstruction weights: jz=5 (dominant in-plane current), jx=jy=1
#     (zero physical mean by symmetry — the constant-zero prediction is
#     correct), num_α=p_x_α=1, the weakly-structured / out-of-plane
#     p_{y,z}_α and ene_α=0.3.
#   * Per-(species, moment) normalization in the dataset; the
#     pooled-by-bare-moment-name normalizer was replaced after the
#     pooled inverse on smaller-scale species (m_e ≪ m_D) was found
#     to render P and T physically meaningless.
#   * Charge-continuity term: ||∇·J_pred - ∇·J_GT||² with a Nyquist-
#     fraction lowpass on the divergence-residual field. The lowpass
#     restricts the constraint to scales where the GT has signal,
#     avoiding the high-k deposition-noise floor that drove train/val
#     overfitting on the cell-by-cell residual in earlier runs.
#   * Closure-consistency term: ||P_pred - P_GT||²/σ²(P_GT) summed
#     per species, where P is the pressure derived from (num, p, ene)
#     via the moment-closure formula. Enforces that the network's
#     predicted moments mutually satisfy the closure relation rather
#     than independently fitting each output channel.
#
# This file is itself a valid case config, but is not meant to be
# passed directly to `particle-denoise train`. Use a variant file
# (e.g. planar_pinch_2d_denoise_charbonnier.yaml) so the run picks
# an explicit loss recipe.

data:
  reader: warpxPlotfile
  warpx_input: inputs/planar_pinch_2d.in

  ppc_tiers:
    - {name: ppc0036, ppc: 36,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0036.nproc00016}
    - {name: ppc0064, ppc: 64,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0064.nproc00016}
    - {name: ppc0144, ppc: 144,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0144.nproc00016}
    - {name: ppc0256, ppc: 256,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0256.nproc00016}
    - {name: ppc1024, ppc: 1024, ground_truth: true,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc1024.nproc00016}

  val_fraction: 0.15

  channels:
    fields:
      - By
      - jx
      - jy
      - jz
      - part_per_cell
    species:
      - num
      - px
      - py
      - pz
      - enex
      - eney
      - enez
      - Pxx
      - Pyy
      - Pzz
      - Tx
      - Ty
      - Tz
    species_names:
      - electrons
      - deuterium
    output_fields:
      - jx
      - jy
      - jz
    output_species_moments:
      - num
      - px
      - py
      - pz
      - enex
      - eney
      - enez

model:
  name: unet
  base_channels: 32
  depth: 3

loss:
  # Reconstruction-term weight + per-channel weights are case-specific,
  # so they live in the base. The element-wise kind (recon_kind /
  # recon_eps) and the gradient-of-error term are loss-recipe-specific
  # and are set in each variant YAML.
  recon: 1.0
  recon_weights:
    jx:              1.0
    jy:              1.0
    jz:              5.0
    num_electrons:   1.0
    num_deuterium:   1.0
    px_electrons:    1.0
    px_deuterium:    1.0
    py_electrons:    0.3
    py_deuterium:    0.3
    pz_electrons:    0.3
    pz_deuterium:    0.3
    enex_electrons:  0.3
    eney_electrons:  0.3
    enez_electrons:  0.3
    enex_deuterium:  0.3
    eney_deuterium:  0.3
    enez_deuterium:  0.3
  conservation: 0.1
  spectral: 0.05
  # Charge-continuity ||∇·J_pred - ∇·J_GT||² with a lowpass on the
  # divergence residual: cutoff 0.5 keeps modes |k|/k_nyq ≤ 0.5 along
  # each spatial axis (the long-wavelength half of the spectrum, where
  # the GT current has signal above the deposition-noise floor).
  charge_continuity:        1.0
  charge_continuity_cutoff: 0.5
  # Closure-consistency on per-species pressure derived from
  # (num, p, ene). Self-normalized per batch (σ(P_GT)) so the term
  # is dimensionless and roughly O(1).
  closure_consistency:      1.0

train:
  batch_size: 4
  epochs: 200
  lr: 1.0e-3
  amp: true
  early_stop_patience: 30
