# Shared base for the 2D Cartesian planar-pinch global U-Net denoiser
# cases on Tuolumne. Variants under this directory layer their loss
# recipe on top of this.
#
# Channel set restricted by the signal-to-noise audit driven by the
# Angus et al. 2022 equipartition analysis (Eqn 24) and §3.1.4 of the
# working doc, with bulk-velocity moments replaced by per-species
# momentum-density components (p_α = m_α · u_α / V_cell):
#
#   * Inputs (fields): By (Z-pinch dominant component), all three
#     components of J (load-bearing), part_per_cell. Dropped Ex (PIC
#     deposition noise dominates the sheath drive at the resolved ppc),
#     Ey/Ez/Bx/Bz (equipartition-only in this 2D x-z geometry), and
#     rho (quasi-neutral and statistically noisy in this 2D Cartesian
#     plasma — drops out of both input and output).
#   * Inputs (species): per-species number, three momentum-density
#     components (px, py, pz) and three kinetic-energy components.
#     Momentum p_α replaces the bare velocity moments u_α so the
#     ∂ρ_α/∂t + ∇·J_α charge-continuity discussion has a natural
#     symmetric expression in input and output.
#   * Outputs: J = (jx, jy, jz) (consumed by the implicit field solver),
#     plus per-species num_α, p{x,y,z}_α, and ene{x,y,z}_α. Dropping rho
#     follows from its near-zero quasi-neutral mean: it is dominated by
#     statistical (deposition / Monte-Carlo) noise and not load-bearing.
#   * Per-channel reconstruction weights: jz weight 5 (the dominant
#     load-bearing current in this geometry), jx/jy weight 1
#     (their physical mean is ~0; the model already collapses to that
#     correct constant prediction). num_α and p_x_α weight 1; the
#     out-of-plane / weakly-structured p_y_α, p_z_α and the
#     ene{x,y,z}_α moments weight 0.3.
#   * Charge-continuity term enabled at weight 1.0: enforces
#     ∇·J_pred ≈ ∇·J_GT in physical units. Villasenor charge-conserving
#     deposition makes the WarpX-deposited (ρ, J) satisfy
#     ∂ρ/∂t + ∇·J = 0 exactly, so this is also the discrete residual of
#     the continuity equation when ρ is held to GT.
#
# This file is itself a valid case config, but is not meant to be
# passed directly to `particle-denoise train`. Use a variant file
# (e.g. planar_pinch_2d_denoise_charbonnier.yaml) so the run picks
# an explicit loss recipe.

data:
  reader: warpxPlotfile
  warpx_input: inputs/planar_pinch_2d.in

  ppc_tiers:
    - {name: ppc0036, ppc: 36,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0036.nproc00016}
    - {name: ppc0064, ppc: 64,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0064.nproc00016}
    - {name: ppc0144, ppc: 144,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0144.nproc00016}
    - {name: ppc0256, ppc: 256,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc0256.nproc00016}
    - {name: ppc1024, ppc: 1024, ground_truth: true,
       run_dir: .run_planar_pinch_2d.tuolumne.ppc1024.nproc00016}

  val_fraction: 0.15

  channels:
    fields:
      - By
      - jx
      - jy
      - jz
      - part_per_cell
    species:
      - num
      - px
      - py
      - pz
      - enex
      - eney
      - enez
    species_names:
      - electrons
      - deuterium
    output_fields:
      - jx
      - jy
      - jz
    output_species_moments:
      - num
      - px
      - py
      - pz
      - enex
      - eney
      - enez

model:
  name: unet
  base_channels: 32
  depth: 3

loss:
  # Reconstruction-term weight + per-channel weights are case-specific,
  # so they live in the base. The element-wise kind (recon_kind /
  # recon_eps) and the gradient-of-error term are loss-recipe-specific
  # and are set in each variant YAML.
  recon: 1.0
  recon_weights:
    jx:              1.0
    jy:              1.0
    jz:              5.0
    num_electrons:   1.0
    num_deuterium:   1.0
    px_electrons:    1.0
    px_deuterium:    1.0
    py_electrons:    0.3
    py_deuterium:    0.3
    pz_electrons:    0.3
    pz_deuterium:    0.3
    enex_electrons:  0.3
    eney_electrons:  0.3
    enez_electrons:  0.3
    enex_deuterium:  0.3
    eney_deuterium:  0.3
    enez_deuterium:  0.3
  conservation: 0.1
  spectral: 0.05
  charge_continuity: 1.0

train:
  batch_size: 4
  epochs: 200
  lr: 1.0e-3
  amp: true
  early_stop_patience: 30
