# particle-denoise config for the 2D Cartesian planar-pinch paired ppc sweep
# on Tuolumne.
#
# The framework's default config (~/Codes/particle-denoise/configs/default.yaml)
# is loaded first; the CLI layers this case config on top. Overrides on the
# CLI (key.sub=value) win over both.
#
# Run:
#   particle-denoise train --config /home/ghosh/Runs/warpx/2d_planar_pinch/denoise/planar_pinch_2d_denoise.yaml

data:
  reader: warpxPlotfile
  warpx_input: /home/ghosh/Runs/warpx/2d_planar_pinch/inputs/planar_pinch_2d.in

  ppc_tiers:
    - {name: ppc0049, ppc: 49,
       run_dir: /home/ghosh/Runs/remote/WarpX/2d_planar_pinch/.run_planar_pinch_2d.tuolumne.ppc0049.nproc00016}
    - {name: ppc0100, ppc: 100,
       run_dir: /home/ghosh/Runs/remote/WarpX/2d_planar_pinch/.run_planar_pinch_2d.tuolumne.ppc0100.nproc00016}
    - {name: ppc0400, ppc: 400,
       run_dir: /home/ghosh/Runs/remote/WarpX/2d_planar_pinch/.run_planar_pinch_2d.tuolumne.ppc0400.nproc00016}
    - {name: ppc1600, ppc: 1600, ground_truth: true,
       run_dir: /home/ghosh/Runs/remote/WarpX/2d_planar_pinch/.run_planar_pinch_2d.tuolumne.ppc1600.nproc00016}

  # ppc1600 is the bottleneck (still running); cap the step list at what it
  # has so every training pair is complete. Set to null once ppc1600 finishes.
  steps: [0, 2200, 4400, 6600, 8800, 11000, 13200, 15400, 17600, 19800,
          22000, 24200, 26400, 28600, 30800, 33000, 35200, 37400, 39600,
          41800, 44000, 46200, 48400, 50600, 52800, 55000, 57200, 59400,
          61600, 63800, 66000, 68200, 70400, 72600, 74800, 77000]

  val_fraction: 0.15

model:
  name: unet
  base_channels: 32
  depth: 3

loss:
  recon_l2: 1.0
  conservation: 0.1
  spectral: 0.05

train:
  batch_size: 4
  epochs: 200
  lr: 1.0e-3
  amp: true
